name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@11.6.4
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run --filter '*' build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # `publish:` is exec'd directly (no shell), so chaining must live in
          # the `ci:publish` script. It rewrites `workspace:*` on the runner,
          # then invokes `changeset publish`. Keep it out of `version:` — those
          # edits get committed back to the Version Packages PR.
          publish: bun run ci:publish
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
